<!DOCTYPE html>
<html lang="en">
<head>
    <title>DevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .product-img {
            height: 250px;
            object-fit: cover;
            width: 100%;
        }
        .card {
            height: 100%;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'store:product_list' %}">DevShop</a>
        
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'store:login' %}">Home</a>
            <a class="nav-link" href="{% url 'store:product_list' %}">Product</a>
            <a class="nav-link" href="{% url 'store:cart' %}">Cart</a>
            <a class="nav-link" href="{% url 'store:wishlist' %}">Wishlist</a>
        </div>
    </div>
</nav>

    

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
